name: Development

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Generate route types
        run: npx next typegen

      - name: Type check
        run: npx tsc --noEmit -p .

      - name: Lint
        run: npm run lint
